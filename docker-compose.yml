services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      DJANGO_DB_NAME: ${POSTGRES_DB:-app}
      DJANGO_DB_USER: ${POSTGRES_USER:-app}
      DJANGO_DB_PASSWORD: ${POSTGRES_PASSWORD:-app}
      FAL_KEY: ${FAL_KEY:-}
      # Nano Banana 2 image editing (supports multi-image reference)
      FAL_ENDPOINT: ${FAL_ENDPOINT:-fal-ai/nano-banana-2/edit}
      FAL_RESOLUTION: ${FAL_RESOLUTION:-1K}
      FAL_ASPECT_RATIO: ${FAL_ASPECT_RATIO:-2:3}
      FAL_OUTPUT_FORMAT: ${FAL_OUTPUT_FORMAT:-jpeg}
      FAL_NUM_IMAGES: ${FAL_NUM_IMAGES:-1}
      FAL_SEED: ${FAL_SEED:-0}
      # Downscale uploaded references to reduce upload size/latency (pricing is per output for Nano Banana 2).
      FAL_MAX_MEGAPIXELS: ${FAL_MAX_MEGAPIXELS:-1}
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
      # Docker Desktop on macOS/Windows: file events may not propagate reliably; polling makes HMR stable.
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  backend_media:
